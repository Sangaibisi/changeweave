spring:
  application:
    name: changelogai-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:changelogai}
    username: ${DB_USERNAME:changelogai}
    password: ${DB_PASSWORD:changelogai}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    time-zone: UTC

  mail:
    host: ${MAIL_HOST:smtp.sendgrid.net}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:apikey}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:changelogai-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
    access-token-expiration: 900000      # 15 minutes
    refresh-token-expiration: 604800000  # 7 days

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:}

  gitlab:
    url: ${GITLAB_URL:https://gitlab.com}
    client-id: ${GITLAB_CLIENT_ID:}
    client-secret: ${GITLAB_CLIENT_SECRET:}

  bitbucket:
    client-id: ${BITBUCKET_CLIENT_ID:}
    client-secret: ${BITBUCKET_CLIENT_SECRET:}

  bitbucket-dc:
    url: ${BITBUCKET_DC_URL:}

  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    max-tokens: 2000
    temperature: 0.7

  public-url: ${PUBLIC_URL:http://localhost:3000}

  mcp:
    server-url: ${MCP_SERVER_URL:http://localhost:3100}
    enabled: ${MCP_ENABLED:true}
    timeout: ${MCP_TIMEOUT:30000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false

logging:
  level:
    com.changelogai: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
