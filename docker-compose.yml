services:
  postgres:
    image: postgres:16-alpine
    container_name: changelogai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: changelogai
      POSTGRES_USER: changelogai
      POSTGRES_PASSWORD: changelogai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U changelogai"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: changelogai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  mcp-server:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    container_name: changelogai-mcp
    ports:
      - "3100:3100"
    environment:
      MCP_TRANSPORT: http
      MCP_PORT: 3100
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LOG_LEVEL: info
      CONTEXT_TOKEN_BUDGET: 8000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: changelogai-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: changelogai
      DB_USERNAME: changelogai
      DB_PASSWORD: changelogai
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-changelogai-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      MCP_SERVER_URL: http://mcp-server:3100
      MCP_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: changelogai-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
